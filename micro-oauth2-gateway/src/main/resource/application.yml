server:
  port: 9201
spring:
  profiles:
    active: prod
  application:
    name: micro-oauth2-gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:http://127.0.0.1:8848}


    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: "*" # spring boot2.4配置
            # allowed-origins: "*"
            allowed-headers: "*"
            allow-credentials: true
            allowed-methods:
              - GET
              - POST
              - DELETE
              - PUT
              - OPTION
      routes: #配置路由规则
        - id: oauth2-teach-route
          uri: lb://micro-teaching-quality
          predicates:
            - Path=/teaching/**
          filters:
            - StripPrefix=1
            - RequestRateLimiter=1,10

        - id: oauth2-auth-route
          uri: lb://micro-oauth2-auth
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

      discovery:
        locator:
          enabled: true #开启从注册中心动态创建路由的功能
          lower-case-service-id: true #使用小写服务名，默认是大写
  redis:
    database: 0
    port: ${GATEWAY_REDIS_PORT:6379}
    host: ${GATEWAY_REDIS_HOST:127.0.0.1}
    password: ${GATEWAY_REDIS_PASSWORD:}
  main:
    allow-bean-definition-overriding: true
security:
  jwt:
    key-store-password: ${JWT_KEYSTORE_PASSWORD:changeit}
    key-pair-alias: ${JWT_KEY_PAIR_ALIAS:jwt}
    key-pair-password: ${JWT_KEY_PAIR_PASSWORD:changeit}
secure:
  ignore:
    urls: #配置白名单路径
      - "/actuator/**"
      - "/auth/oauth/**"
      - "/teaching/user/send"
      - "/teaching/user/forget"
      - "/teaching/user/createAccount"
      - "/teaching/user/forgetPassword"
