  port: 8082
  servlet:
    context-path: /

# Spring配置
spring:
  profiles: prod
  datasource:
    # 如果存在多个数据源，监控的时候可以通过名字来区分开来
    name: mysql
    # 连接数据库的url
    url: jdbc:mysql://117.72.95.156:3306/teach_quality?characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    # 连接数据库的账号
    username: lighthouse
    # 连接数据库的密码
    password: vtmer2024!

  redis:
    host: 117.72.95.156
    port: 6379
    # redis密码，默认为空
